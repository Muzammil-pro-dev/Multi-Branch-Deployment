name: Multi-Branch Deployment

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Unit Tests
        run: echo "Running automated tests to ensure code quality..."

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' 
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Agar push 'main' branch par hua hai
      - name: Deploy to Production
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Deploying to Production Environment..."
          echo "Status: Production Deployment Successful!"

      - name: Deploy to QA
        if: github.ref == 'refs/heads/dev'
        run: |
          echo "Deploying to QA / Staging Environment..."
          echo "Status: QA Deployment Successful!"